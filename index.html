<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Nobl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Inter:wght@300;400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="config.js"></script>
</head>
<body>

  <!-- HOME VIEW -->
  <main id="home-view" class="view active">

    <!-- TOP BAR: logo + search -->
    <div class="top-bar-wrap">
      <div class="top-bar-inner">
        <a href="#" class="nav-logo" id="nav-logo">Nobl<span>.</span></a>
        <div class="nav-search" id="nav-search">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search" autocomplete="off" />
          <button class="search-clear" id="search-clear" aria-label="Clear search">×</button>
          <div class="search-tag-dropdown hidden" id="search-tag-dropdown"></div>
        </div>
        <div class="contact-wrap" id="contact-wrap">
          <button class="contact-btn" id="contact-btn" aria-label="Get in touch">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
              <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
            </svg>
          </button>
          <div class="contact-dropdown hidden" id="contact-dropdown">
            <p class="contact-heading">ideas or feedback?</p>
            <a href="mailto:noah.hupfeld@gmail.com" class="contact-option">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 7 10-7"/>
              </svg>
              Email
            </a>
            <a href="https://instagram.com/noah.hup" target="_blank" rel="noopener" class="contact-option">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="15" height="15">
                <rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/><circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"/>
              </svg>
              Instagram
            </a>
          </div>
        </div>
      </div>
    </div>

    <!-- COMING SOON -->
    <div class="ideas-wrap" id="ideas-wrap"></div>

    <!-- FEED -->
    <div class="feed-wrap">
      <div class="feed" id="feed"></div>
      <div class="no-results hidden" id="no-results">
        <p>No posts found.</p>
      </div>

    </div>

  </main>

  <!-- POST VIEW -->
  <main id="post-view" class="view">
    <div class="post-wrap">
      <button class="back-btn" id="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </button>
      <article class="post-article">
        <div class="post-meta-top" id="post-meta-top">
          <img class="post-avatar" id="post-avatar" src="" alt="" />
          <div class="post-meta-top-text">
            <span class="post-author" id="post-author"></span>
            <span class="post-date-read">
              <span id="post-date"></span>
              <span class="dot">·</span>
              <span id="post-read-time"></span> min read
            </span>
          </div>
        </div>
        <h1 class="post-title" id="post-title"></h1>
        <p class="post-subtitle" id="post-subtitle"></p>
        <div class="post-tags" id="post-tags"></div>
        <div class="post-cover-wrap" id="post-cover-wrap">
          <img class="post-cover" id="post-cover" src="" alt="" />
        </div>
        <div class="post-body" id="post-body"></div>
      </article>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
