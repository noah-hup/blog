<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title id="page-title">Nobl</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=Source+Serif+4:ital,opsz,wght@0,8..60,300;0,8..60,400;0,8..60,600;0,8..60,700;1,8..60,300;1,8..60,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
  <script src="config.js"></script>
</head>
<body>

  <!-- HOME VIEW -->
  <main id="home-view" class="view active">

    <!-- TOP BAR: logo + search -->
    <div class="top-bar-wrap">
      <div class="top-bar-inner">
        <a href="#" class="nav-logo" id="nav-logo"><span class="logo-n">N</span><span class="logo-o">o</span><span class="logo-b">b</span><span class="logo-l">l</span><span class="logo-dot">.</span></a>
        <div class="nav-search">
          <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search" autocomplete="off" />
          <button class="search-clear" id="search-clear" aria-label="Clear search">×</button>
        </div>
      </div>
      <!-- FILTER ROW: below divider -->
      <div class="filter-row">
        <div class="filter-row-inner">
          <div class="tag-dropdown-inner">
            <button class="tag-dropdown-btn" id="tag-dropdown-btn">
              <span id="tag-dropdown-label">All</span>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="13" height="13"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="tag-dropdown-menu hidden" id="tag-dropdown-menu">
              <button class="tag-dropdown-item active" data-tag="all">All</button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- FEED -->
    <div class="feed-wrap">
      <div class="feed" id="feed"></div>
      <div class="no-results hidden" id="no-results">
        <p>No posts found.</p>
      </div>
      <div class="load-more-wrap" id="load-more-wrap">
        <button class="load-more-btn" id="load-more-btn">Load more</button>
      </div>
    </div>

  </main>

  <!-- POST VIEW -->
  <main id="post-view" class="view">
    <div class="post-wrap">
      <button class="back-btn" id="back-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" width="16" height="16">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        Back
      </button>
      <article class="post-article">
        <div class="post-meta-top" id="post-meta-top">
          <img class="post-avatar" id="post-avatar" src="" alt="" />
          <div class="post-meta-top-text">
            <span class="post-author" id="post-author"></span>
            <span class="post-date-read">
              <span id="post-date"></span>
              <span class="dot">·</span>
              <span id="post-read-time"></span> min read
            </span>
          </div>
        </div>
        <h1 class="post-title" id="post-title"></h1>
        <p class="post-subtitle" id="post-subtitle"></p>
        <div class="post-tags" id="post-tags"></div>
        <div class="post-cover-wrap" id="post-cover-wrap">
          <img class="post-cover" id="post-cover" src="" alt="" />
        </div>
        <div class="post-body" id="post-body"></div>
      </article>
    </div>
  </main>

  <script src="app.js"></script>
</body>
</html>
